<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Umrah Bot — Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f2f5;color:#111;height:100vh;display:flex;flex-direction:column}
/* ── Auth screen ── */
#auth-screen{display:flex;align-items:center;justify-content:center;flex:1;background:#f0f2f5}
.auth-card{background:#fff;padding:40px;border-radius:16px;width:360px;box-shadow:0 2px 16px rgba(0,0,0,.08)}
.auth-card h2{font-size:20px;margin-bottom:4px}
.auth-card p{color:#666;font-size:13px;margin-bottom:24px}
.auth-tabs{display:flex;gap:0;margin-bottom:20px;border:1px solid #ddd;border-radius:8px;overflow:hidden}
.auth-tab{flex:1;padding:9px;text-align:center;font-size:13px;cursor:pointer;background:#f9f9f9;border:none;font-weight:500;color:#666}
.auth-tab.active{background:#075e54;color:#fff}
input[type=text],input[type=password],input[type=number],textarea,select{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;font-family:inherit}
input:focus,textarea:focus,select:focus{border-color:#075e54}
.btn{padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500}
.btn-primary{background:#075e54;color:#fff;width:100%;padding:11px;margin-top:12px}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-danger{background:#fee2e2;color:#dc2626}
.btn-success{background:#dcfce7;color:#16a34a}
.btn-blue{background:#dbeafe;color:#1d4ed8}
.err{color:#dc2626;font-size:12px;margin-top:8px}
/* ── Main app ── */
#app{display:none;flex:1;flex-direction:column;height:100vh}
.topbar{background:#075e54;color:#fff;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{font-size:16px;font-weight:500}
.topbar-right{display:flex;align-items:center;gap:16px;font-size:13px}
.topbar-right button{background:rgba(255,255,255,.15);color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.main{display:flex;flex:1;overflow:hidden}
/* ── Sidebar ── */
.sidebar{width:300px;background:#fff;border-right:1px solid #e8e8e8;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:14px 16px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between}
.sidebar-header h3{font-size:14px;font-weight:500}
.search-box{padding:10px 12px;border-bottom:1px solid #eee}
.search-box input{background:#f5f5f5;border-color:#f5f5f5}
.customer-list{flex:1;overflow-y:auto}
.customer-item{padding:12px 14px;border-bottom:1px solid #f5f5f5;cursor:pointer;display:flex;gap:10px;align-items:flex-start}
.customer-item:hover{background:#f6fdf6}
.customer-item.active{background:#e8f5e9}
.customer-item.paused{border-left:3px solid #f59e0b}
.avatar{width:38px;height:38px;border-radius:50%;background:#075e54;color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;flex-shrink:0}
.cust-info{flex:1;min-width:0}
.cust-name{font-size:13px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cust-preview{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cust-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.cust-time{font-size:10px;color:#aaa}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.badge-active{background:#dcfce7;color:#16a34a}
.badge-paused{background:#fef3c7;color:#d97706}
.badge-new{background:#dbeafe;color:#1d4ed8}
/* ── Stats bar ── */
.stats-bar{padding:16px 20px;background:#fff;border-bottom:1px solid #eee;display:flex;gap:16px;flex-wrap:wrap}
.stat-pill{background:#f5f5f5;border-radius:20px;padding:6px 14px;font-size:12px;color:#555;display:flex;align-items:center;gap:6px}
.stat-pill strong{font-size:16px;color:#111}
/* ── Chat area ── */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-header{padding:12px 20px;background:#fff;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-header-left{display:flex;align-items:center;gap:12px}
.chat-header h3{font-size:15px;font-weight:500}
.chat-header p{font-size:12px;color:#888;margin-top:1px}
.chat-header-right{display:flex;gap:8px;align-items:center}
.takeover-banner{padding:10px 20px;background:#fef3c7;border-bottom:1px solid #fde68a;font-size:13px;color:#92400e;display:flex;align-items:center;justify-content:space-between}
.messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;background:#e5ddd5}
.msg{display:flex;max-width:75%}
.msg.user{align-self:flex-start}
.msg.bot,.msg.agent{align-self:flex-end;flex-direction:row-reverse}
.bubble{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.55;word-break:break-word;position:relative}
.msg.user .bubble{background:#fff;border-radius:0 12px 12px 12px}
.msg.bot .bubble{background:#dcf8c6;border-radius:12px 0 12px 12px}
.msg.agent .bubble{background:#dbeafe;border-radius:12px 0 12px 12px}
.bubble-label{font-size:10px;font-weight:600;margin-bottom:3px}
.msg.user .bubble-label{color:#075e54}
.msg.bot .bubble-label{color:#16a34a}
.msg.agent .bubble-label{color:#1d4ed8}
.bubble-time{font-size:10px;color:#aaa;margin-top:4px;text-align:right}
.reply-bar{padding:12px 16px;background:#f0f0f0;border-top:1px solid #ddd;display:flex;gap:10px;align-items:flex-end;flex-shrink:0}
.reply-bar textarea{flex:1;padding:10px 12px;border:1px solid #ddd;border-radius:10px;font-size:13px;resize:none;height:44px;max-height:120px;line-height:1.4}
.reply-bar button{padding:10px 20px;background:#075e54;color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;flex-shrink:0}
.reply-bar button:disabled{opacity:.5;cursor:not-allowed}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#999;gap:8px;background:#e5ddd5}
.empty-state .icon{font-size:48px}
.empty-state p{font-size:14px}
/* ── Edit panel ── */
.edit-panel{width:240px;background:#fff;border-left:1px solid #eee;padding:16px;overflow-y:auto;flex-shrink:0}
.edit-panel h4{font-size:13px;font-weight:600;margin-bottom:14px;color:#333}
.field-group{margin-bottom:14px}
.field-group label{font-size:11px;color:#888;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.save-btn{width:100%;padding:9px;background:#075e54;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;margin-top:4px}
.no-chat-selected{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:#aaa;background:#e5ddd5}
</style>
</head>
<body>

<!-- ── AUTH SCREEN ─────────────────────────────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-card">
    <h2>Umrah Bot</h2>
    <p>Agent Dashboard — Sign in to continue</p>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showTab('login')">Sign in</button>
      <button class="auth-tab" onclick="showTab('register')">Register</button>
    </div>
    <div id="login-form">
      <input type="text" id="login-user" placeholder="Username" style="margin-bottom:10px">
      <input type="password" id="login-pass" placeholder="Password">
      <button class="btn btn-primary" onclick="login()">Sign in</button>
      <div id="login-err" class="err"></div>
    </div>
    <div id="register-form" style="display:none">
      <input type="text" id="reg-user" placeholder="Choose a username" style="margin-bottom:10px">
      <input type="password" id="reg-pass" placeholder="Choose a password">
      <button class="btn btn-primary" onclick="register()">Create account</button>
      <div id="reg-err" class="err"></div>
    </div>
  </div>
</div>

<!-- ── MAIN APP ────────────────────────────────────────────────────────────── -->
<div id="app">
  <div class="topbar">
    <h1>🕌 Umrah Bot Dashboard</h1>
    <div class="topbar-right">
      <span id="agent-name"></span>
      <button onclick="logout()">Sign out</button>
    </div>
  </div>

  <!-- Stats bar -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-pill"><strong id="s-total">—</strong> customers</div>
    <div class="stat-pill"><strong id="s-active">—</strong> active</div>
    <div class="stat-pill"><strong id="s-paused">—</strong> paused (agent handling)</div>
    <div class="stat-pill"><strong id="s-today">—</strong> new today</div>
    <div class="stat-pill"><strong id="s-msgs">—</strong> total messages</div>
  </div>

  <div class="main">
    <!-- Sidebar: customer list -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h3>Conversations</h3>
        <button class="btn btn-sm btn-blue" onclick="loadCustomers()">↻ Refresh</button>
      </div>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search by number or name..." oninput="filterCustomers()">
      </div>
      <div class="customer-list" id="customer-list">
        <div style="padding:20px;text-align:center;color:#aaa;font-size:13px">Loading...</div>
      </div>
    </div>

    <!-- Chat area -->
    <div class="chat-area" id="chat-area">
      <div class="no-chat-selected">
        <div class="icon">💬</div>
        <p>Select a conversation to view</p>
      </div>
    </div>

    <!-- Edit panel (shown when a chat is open) -->
    <div class="edit-panel" id="edit-panel" style="display:none">
      <h4>Customer info</h4>
      <div class="field-group">
        <label>Name</label>
        <input type="text" id="ep-name" placeholder="Full name">
      </div>
      <div class="field-group">
        <label>Status</label>
        <select id="ep-status">
          <option value="new">New</option>
          <option value="active">Active</option>
          <option value="paused">Paused</option>
          <option value="resolved">Resolved</option>
        </select>
      </div>
      <button class="save-btn" onclick="saveCustomerInfo()">Save</button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let token        = localStorage.getItem('token') || '';
let agentName    = localStorage.getItem('agentName') || '';
let customers    = [];
let activePhone  = null;
let pollInterval = null;

// ── Boot ──────────────────────────────────────────────────────────────────────
window.onload = () => {
  if (token) showApp();
};

// ── Auth helpers ──────────────────────────────────────────────────────────────
function showTab(tab) {
  document.getElementById('login-form').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
  document.querySelectorAll('.auth-tab').forEach((el,i) => {
    el.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register'));
  });
}

async function login() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  document.getElementById('login-err').textContent = '';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.message);
    token = d.token; agentName = d.username;
    localStorage.setItem('token', token);
    localStorage.setItem('agentName', agentName);
    showApp();
  } catch (e) {
    document.getElementById('login-err').textContent = e.message;
  }
}

async function register() {
  const username = document.getElementById('reg-user').value.trim();
  const password = document.getElementById('reg-pass').value;
  document.getElementById('reg-err').textContent = '';
  try {
    const r = await fetch('/api/auth/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.message);
    token = d.token; agentName = d.username;
    localStorage.setItem('token', token);
    localStorage.setItem('agentName', agentName);
    showApp();
  } catch (e) {
    document.getElementById('reg-err').textContent = e.message;
  }
}

function logout() {
  localStorage.clear(); token = ''; agentName = '';
  clearInterval(pollInterval);
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('agent-name').textContent = agentName;
  loadStats();
  loadCustomers();
  // Auto-refresh every 15 seconds
  pollInterval = setInterval(() => {
    loadStats();
    loadCustomers(true); // silent refresh
  }, 15000);
}

// ── API helper ────────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const r = await fetch(path, {
    ...opts,
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers||{}) }
  });
  if (r.status === 401) { logout(); return null; }
  return r.json();
}

// ── Stats ─────────────────────────────────────────────────────────────────────
async function loadStats() {
  const d = await api('/api/stats');
  if (!d) return;
  document.getElementById('s-total').textContent  = d.totalCustomers;
  document.getElementById('s-active').textContent = d.activeChats;
  document.getElementById('s-paused').textContent = d.pausedChats;
  document.getElementById('s-today').textContent  = d.newToday;
  document.getElementById('s-msgs').textContent   = d.totalMessages;
}

// ── Customer list ─────────────────────────────────────────────────────────────
async function loadCustomers(silent = false) {
  if (!silent) {
    document.getElementById('customer-list').innerHTML =
      '<div style="padding:20px;text-align:center;color:#aaa;font-size:13px">Loading...</div>';
  }
  const data = await api('/api/customers');
  if (!data) return;
  customers = data;
  renderCustomerList(customers);
}

function renderCustomerList(list) {
  const el = document.getElementById('customer-list');
  if (!list.length) {
    el.innerHTML = '<div style="padding:30px;text-align:center;color:#aaa;font-size:13px">No conversations yet</div>';
    return;
  }
  el.innerHTML = list.map(c => {
    const initials = (c.customerName || c.phoneNumber).substring(0,2).toUpperCase();
    const name     = c.customerName || c.phoneNumber;
    const preview  = c.lastMessage  || 'No messages yet';
    const time     = c.lastActive   ? timeAgo(new Date(c.lastActive)) : '';
    const badge    = c.isPaused
      ? '<span class="badge badge-paused">Agent</span>'
      : c.status === 'new'
        ? '<span class="badge badge-new">New</span>'
        : '<span class="badge badge-active">Active</span>';
    return `
      <div class="customer-item${c.phoneNumber === activePhone ? ' active' : ''}${c.isPaused ? ' paused' : ''}"
           onclick="openChat('${c.phoneNumber}')">
        <div class="avatar">${initials}</div>
        <div class="cust-info">
          <div class="cust-name">${name}</div>
          <div class="cust-preview">${preview.substring(0,45)}</div>
        </div>
        <div class="cust-meta">
          <div class="cust-time">${time}</div>
          ${badge}
        </div>
      </div>`;
  }).join('');
}

function filterCustomers() {
  const q = document.getElementById('search-input').value.toLowerCase();
  renderCustomerList(customers.filter(c =>
    c.phoneNumber.includes(q) || (c.customerName||'').toLowerCase().includes(q)
  ));
}

// ── Open a chat ───────────────────────────────────────────────────────────────
async function openChat(phone) {
  activePhone = phone;

  // Highlight in sidebar
  document.querySelectorAll('.customer-item').forEach(el => el.classList.remove('active'));
  event?.currentTarget?.classList.add('active');

  const c = await api(`/api/customers/${encodeURIComponent(phone)}`);
  if (!c) return;

  // Show edit panel
  document.getElementById('edit-panel').style.display = '';
  document.getElementById('ep-name').value   = c.customerName || '';
  document.getElementById('ep-status').value = c.status || 'new';

  // Render chat
  const chatArea = document.getElementById('chat-area');
  chatArea.innerHTML = `
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="avatar">${(c.customerName||c.phoneNumber).substring(0,2).toUpperCase()}</div>
        <div>
          <h3>${c.customerName || c.phoneNumber}</h3>
          <p>${c.phoneNumber} · ${c.messageCount||0} messages</p>
        </div>
      </div>
      <div class="chat-header-right">
        ${c.isPaused
          ? `<span style="font-size:12px;color:#d97706">⏸ Paused by ${c.pausedBy}</span>
             <button class="btn btn-sm btn-success" onclick="resumeBot('${phone}')">▶ Resume bot</button>`
          : `<button class="btn btn-sm btn-danger" onclick="pauseBot('${phone}')">⏸ Take over chat</button>`
        }
      </div>
    </div>
    ${c.isPaused ? `
    <div class="takeover-banner">
      ⚠️ Bot is paused — you are handling this conversation. Type below to reply as your team.
      <button class="btn btn-sm btn-success" onclick="resumeBot('${phone}')">Hand back to bot</button>
    </div>` : ''}
    <div class="messages" id="messages">
      ${(c.messages||[]).length === 0
        ? '<div style="text-align:center;color:#aaa;font-size:13px;padding:20px">No messages yet</div>'
        : (c.messages||[]).map(m => `
          <div class="msg ${m.role}">
            <div class="bubble">
              <div class="bubble-label">${m.role === 'user' ? 'Customer' : m.role === 'agent' ? 'Agent' : 'Bot'}</div>
              ${m.content.replace(/\n/g,'<br>')}
              <div class="bubble-time">${new Date(m.timestamp).toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit'})}</div>
            </div>
          </div>`).join('')
      }
    </div>
    <div class="reply-bar">
      <textarea id="reply-input" placeholder="${c.isPaused ? 'Type your reply as agent...' : 'Bot is active — pause first to reply manually'}"
        ${c.isPaused ? '' : 'disabled'}
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendReply('${phone}')}"></textarea>
      <button onclick="sendReply('${phone}')" ${c.isPaused ? '' : 'disabled'}>Send</button>
    </div>`;

  // Scroll to bottom
  setTimeout(() => {
    const msgs = document.getElementById('messages');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
  }, 50);
}

// ── Pause / Resume bot ────────────────────────────────────────────────────────
async function pauseBot(phone) {
  if (!confirm('Pause the bot and take over this conversation?')) return;
  await api(`/api/customers/${encodeURIComponent(phone)}/pause`, { method: 'POST' });
  await openChat(phone);
  loadCustomers(true);
  loadStats();
}

async function resumeBot(phone) {
  if (!confirm('Hand this conversation back to the bot?')) return;
  await api(`/api/customers/${encodeURIComponent(phone)}/resume`, { method: 'POST' });
  await openChat(phone);
  loadCustomers(true);
  loadStats();
}

// ── Send manual reply ─────────────────────────────────────────────────────────
async function sendReply(phone) {
  const input = document.getElementById('reply-input');
  const text  = input?.value.trim();
  if (!text) return;
  input.value = '';
  input.disabled = true;
  document.querySelector('.reply-bar button').disabled = true;
  try {
    await api(`/api/customers/${encodeURIComponent(phone)}/reply`, {
      method: 'POST',
      body: JSON.stringify({ message: text })
    });
    await openChat(phone); // refresh chat
  } catch {
    input.value = text; // restore on failure
  } finally {
    input.disabled = false;
    document.querySelector('.reply-bar button').disabled = false;
    input.focus();
  }
}

// ── Save customer info ────────────────────────────────────────────────────────
async function saveCustomerInfo() {
  if (!activePhone) return;
  await api(`/api/customers/${encodeURIComponent(activePhone)}`, {
    method: 'PATCH',
    body: JSON.stringify({
      customerName: document.getElementById('ep-name').value.trim(),
      status:       document.getElementById('ep-status').value
    })
  });
  loadCustomers(true);
  await openChat(activePhone);
}

// ── Utility ───────────────────────────────────────────────────────────────────
function timeAgo(date) {
  const s = Math.floor((Date.now() - date) / 1000);
  if (s < 60)   return 'just now';
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400)return `${Math.floor(s/3600)}h ago`;
  return date.toLocaleDateString('en-PK');
}
</script>
</body>
</html>
